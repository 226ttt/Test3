<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Hard 15 Stages Mario Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        #ui {
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            color: #ffcc00;
        }
        canvas {
            background: #4a75cd; /* สีฟ้าหม่นลงหน่อยให้ดูท้าทาย */
            border: 3px solid #fff;
            border-radius: 4px;
            max-width: 95vw;
            max-height: 45vh;
            aspect-ratio: 2 / 1;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.7);
        }
        #dpad {
            display: flex;
            justify-content: space-between;
            width: 95vw;
            max-width: 600px;
            margin-top: 20px;
            padding: 10px;
            box-sizing: border-box;
            touch-action: none;
        }
        .btn-group {
            display: flex;
            gap: 15px;
        }
        .ctrl-btn {
            width: 75px;
            height: 75px;
            background: rgba(255, 255, 255, 0.25);
            border: 3px solid #fff;
            border-radius: 50%;
            color: white;
            font-size: 28px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .ctrl-btn.active-touch {
            background: rgba(255, 255, 255, 0.7);
            color: #000;
            transform: scale(0.95);
        }
        #btn-jump {
            background: rgba(255, 85, 85, 0.5);
            width: 85px;
            height: 85px;
            font-size: 32px;
        }
        #btn-jump.active-touch {
            background: rgba(255, 85, 85, 0.9);
        }
    </style>
</head>
<body>

    <div id="ui">STAGE: <span id="stage-num">1</span>/15</div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div id="dpad">
        <div class="btn-group">
            <div class="ctrl-btn" id="btn-left">◀</div>
            <div class="ctrl-btn" id="btn-right">▶</div>
        </div>
        <div class="btn-group">
            <div class="ctrl-btn" id="btn-jump">A</div>
        </div>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let currentStage = 1;
const gravity = 0.5;

const player = {
    x: 50,
    y: 300,
    width: 30,
    height: 40,
    vx: 0,
    vy: 0,
    speed: 5,
    jumpForce: 12,
    grounded: false,
    color: "#ff2222"
};

const keys = { Left: false, Right: false, Jump: false };

// คลังด่านทั้งหมด 1 - 15 ด่าน
const stages = {
    1: [
        { x: 0, y: 360, w: 800, h: 40, type: 'ground' },
        { x: 200, y: 260, w: 100, h: 30, type: 'ground' },
        { x: 400, y: 180, w: 120, h: 30, type: 'ground' },
        { x: 720, y: 280, w: 50, h: 80, type: 'door' }
    ],
    2: [
        { x: 0, y: 360, w: 300, h: 40, type: 'ground' },
        { x: 450, y: 360, w: 350, h: 40, type: 'ground' },
        { x: 250, y: 250, w: 80, h: 20, type: 'ground' },
        { x: 380, y: 200, w: 80, h: 20, type: 'ground' },
        { x: 740, y: 280, w: 50, h: 80, type: 'door' }
    ],
    3: [
        { x: 0, y: 360, w: 800, h: 40, type: 'ground' },
        { x: 250, y: 330, w: 50, h: 30, type: 'spike' },
        { x: 450, y: 330, w: 50, h: 30, type: 'spike' },
        { x: 350, y: 220, w: 100, h: 20, type: 'ground' },
        { x: 740, y: 280, w: 50, h: 80, type: 'door' }
    ],
    4: [
        { x: 0, y: 360, w: 200, h: 40, type: 'ground' },
        { x: 300, y: 300, w: 100, h: 20, type: 'ground' },
        { x: 500, y: 220, w: 100, h: 20, type: 'ground' },
        { x: 700, y: 150, w: 100, h: 250, type: 'ground' },
        { x: 740, y: 70, w: 50, h: 80, type: 'door' }
    ],
    5: [ 
        { x: 0, y: 360, w: 150, h: 40, type: 'ground' },
        { x: 250, y: 360, w: 80, h: 40, type: 'ground' },
        { x: 150, y: 360, w: 100, h: 40, type: 'spike' },
        { x: 330, y: 360, w: 470, h: 40, type: 'spike' },
        { x: 230, y: 240, w: 30, h: 10, type: 'ground' },
        { x: 420, y: 160, w: 30, h: 10, type: 'ground' },
        { x: 620, y: 120, w: 30, h: 10, type: 'ground' }, 
        { x: 740, y: 40, w: 50, h: 80, type: 'door' }
    ],
    6: [
        { x: 0, y: 360, w: 800, h: 40, type: 'ground' },
        { x: 150, y: 270, w: 500, h: 20, type: 'ground' },
        { x: 150, y: 290, w: 20, h: 70, type: 'spike' },
        { x: 630, y: 290, w: 20, h: 70, type: 'spike' },
        { x: 740, y: 190, w: 50, h: 80, type: 'door' }
    ],
    7: [
        { x: 0, y: 360, w: 100, h: 40, type: 'ground' },
        { x: 100, y: 360, w: 600, h: 40, type: 'spike' },
        { x: 700, y: 360, w: 100, h: 40, type: 'ground' },
        { x: 200, y: 250, w: 40, h: 20, type: 'ground' },
        { x: 350, y: 180, w: 40, h: 20, type: 'ground' },
        { x: 500, y: 250, w: 40, h: 20, type: 'ground' },
        { x: 740, y: 280, w: 50, h: 80, type: 'door' }
    ],
    // --- ด่าน 8 ขึ้นไป: เริ่มขยับความยากแบบทารุณ ---
    8: [
        { x: 0, y: 360, w: 800, h: 40, type: 'ground' },
        { x: 150, y: 0, w: 30, h: 300, type: 'spike' }, // กำแพงหนามดักด้านบน ต้องก้มหรือกระโดดเตี้ยๆ
        { x: 350, y: 120, w: 30, h: 240, type: 'spike' }, 
        { x: 550, y: 0, w: 30, h: 300, type: 'spike' },
        { x: 740, y: 280, w: 50, h: 80, type: 'door' }
    ],
    9: [
        { x: 0, y: 360, w: 100, h: 40, type: 'ground' },
        { x: 100, y: 360, w: 700, h: 40, type: 'spike' }, // พื้นข้างล่างคือหนามล้วนๆ
        { x: 140, y: 270, w: 20, h: 10, type: 'ground' }, // แท่นเหยียบขนาดจิ๋วเท่าเม็ดถั่ว
        { x: 260, y: 220, w: 20, h: 10, type: 'ground' },
        { x: 380, y: 170, w: 20, h: 10, type: 'ground' },
        { x: 500, y: 220, w: 20, h: 10, type: 'ground' },
        { x: 620, y: 270, w: 20, h: 10, type: 'ground' },
        { x: 740, y: 280, w: 50, h: 80, type: 'door' }
    ],
    // --- ด่าน 10: "ไม่มีทางผ่านได้จริง" (หนามกั้นโลก ประตูลอยฟ้า) ---
    10: [
        { x: 0, y: 360, w: 100, h: 40, type: 'ground' },
        { x: 100, y: 120, w: 700, h: 280, type: 'spike' }, // หนามสูงท่วมหัวยาวไปจนสุดจอ
        { x: 740, y: 20, w: 50, h: 80, type: 'door' } // ประตูลอยอยู่ขวากลางอากาศ ไม่มีแท่นใดๆ ให้เหยียบ
    ],
    11: [
        { x: 0, y: 360, w: 250, h: 40, type: 'ground' },
        { x: 250, y: 360, w: 300, h: 40, type: 'spike' },
        { x: 550, y: 360, w: 250, h: 40, type: 'ground' },
        { x: 380, y: 230, w: 40, h: 10, type: 'ground' },
        { x: 380, y: 130, w: 40, h: 10, type: 'spike' }, // ดักหัวคนกระโดดสูง
        { x: 740, y: 280, w: 50, h: 80, type: 'door' }
    ],
    12: [
        { x: 0, y: 360, w: 800, h: 40, type: 'ground' },
        // เขาวงกตบีบช่องเดินแคบๆ พลาดนิดเดียวโดนหนามขนาบข้าง
        { x: 150, y: 150, w: 30, h: 210, type: 'spike' },
        { x: 150, y: 0, w: 30, h: 70, type: 'spike' },
        { x: 300, y: 0, w: 30, h: 240, type: 'spike' },
        { x: 450, y: 120, w: 30, h: 240, type: 'spike' },
        { x: 600, y: 0, w: 30, h: 240, type: 'spike' },
        { x: 740, y: 280, w: 50, h: 80, type: 'door' }
    ],
    13: [
        { x: 0, y: 360, w: 150, h: 40, type: 'ground' },
        { x: 150, y: 360, w: 500, h: 40, type: 'spike' },
        { x: 650, y: 360, w: 150, h: 40, type: 'ground' },
        // แท่นบันไดลวงตาที่ต้องใช้ความแม่นยำระดับพิกเซล
        { x: 200, y: 280, w: 15, h: 10, type: 'ground' },
        { x: 300, y: 220, w: 15, h: 10, type: 'ground' },
        { x: 400, y: 160, w: 15, h: 10, type: 'ground' },
        { x: 500, y: 220, w: 15, h: 10, type: 'ground' },
        { x: 600, y: 280, w: 15, h: 10, type: 'ground' },
        { x: 740, y: 280, w: 50, h: 80, type: 'door' }
    ],
    14: [
        { x: 0, y: 360, w: 800, h: 40, type: 'ground' },
        // อุโมงค์หนามเตี้ย ต้องอาศัยแรงเฉื่อยวิ่งสไลด์ (แต่เกมนี้สไลด์ไม่ได้ แปลว่าต้องกะจังหวะเดินสั้นมากๆ)
        { x: 200, y: 0, w: 400, h: 290, type: 'spike' },
        { x: 740, y: 280, w: 50, h: 80, type: 'door' }
    ],
    15: [
        // ด่านสุดท้าย!
        { x: 0, y: 360, w: 100, h: 40, type: 'ground' },
        { x: 100, y: 360, w: 600, h: 40, type: 'spike' },
        { x: 700, y: 360, w: 100, h: 40, type: 'ground' },
        { x: 200, y: 250, w: 30, h: 10, type: 'ground' },
        { x: 380, y: 180, w: 30, h: 10, type: 'spike' }, // แท่นหลอก แท้จริงแล้วเป็นหนาม!
        { x: 550, y: 250, w: 30, h: 10, type: 'ground' },
        { x: 740, y: 280, w: 50, h: 80, type: 'door' }
    ]
};

window.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight" || e.key === "d") keys.Right = true;
    if (e.key === "ArrowLeft" || e.key === "a") keys.Left = true;
    if (e.key === "ArrowUp" || e.key === " " || e.key === "w") keys.Jump = true;
    
    // 🤫 สูตรลับเฉพาะคุณ: ในด่าน 10 ถ้ากดปุ่ม 'p' จะวาร์ปข้ามกำแพงหนามไปหน้าประตูทันที!
    if (e.key === "p" && currentStage === 10) {
        player.x = 700;
        player.y = 50;
    }
});
window.addEventListener("keyup", (e) => {
    if (e.key === "ArrowRight" || e.key === "d") keys.Right = false;
    if (e.key === "ArrowLeft" || e.key === "a") keys.Left = false;
    if (e.key === "ArrowUp" || e.key === " " || e.key === "w") keys.Jump = false;
});

const mappedButtons = [
    { id: "btn-left", key: "Left" },
    { id: "btn-right", key: "Right" },
    { id: "btn-jump", key: "Jump" }
];

function processTouches(e) {
    e.preventDefault();
    keys.Left = false;
    keys.Right = false;
    keys.Jump = false;
    
    mappedButtons.forEach(b => document.getElementById(b.id).classList.remove("active-touch"));

    for (let i = 0; i < e.touches.length; i++) {
        const touch = e.touches[i];
        
        mappedButtons.forEach(btnInfo => {
            const btnEl = document.getElementById(btnInfo.id);
            const position = btnEl.getBoundingClientRect();
            
            if (touch.clientX >= position.left && touch.clientX <= position.right &&
                touch.clientY >= position.top && touch.clientY <= position.bottom) {
                
                keys[btnInfo.key] = true;
                btnEl.classList.add("active-touch");
            }
        });
        
        // 🤫 สูตรลับมือถือ: ในด่าน 10 ถ้าใช้นิ้วที่ 3 แตะที่บริเวณ "มุมซ้ายบนสุดของจอ" จะวาร์ปผ่านหนามทันที!
        if (currentStage === 10 && touch.clientX < 60 && touch.clientY < 60) {
            player.x = 700;
            player.y = 50;
        }
    }
}

const dpadArea = document.getElementById("dpad");
dpadArea.addEventListener("touchstart", processTouches, { passive: false });
dpadArea.addEventListener("touchmove", processTouches, { passive: false });
dpadArea.addEventListener("touchend", processTouches, { passive: false });
dpadArea.addEventListener("touchcancel", processTouches, { passive: false });

function resetPlayer() {
    player.x = 50;
    player.y = 200;
    player.vx = 0;
    player.vy = 0;
}

function update() {
    if (keys.Right) {
        player.vx = player.speed;
    } else if (keys.Left) {
        player.vx = -player.speed;
    } else {
        player.vx = 0;
    }

    if (keys.Jump && player.grounded) {
        player.vy = -player.jumpForce;
        player.grounded = false;
    }

    player.vy += gravity;
    player.x += player.vx;
    player.y += player.vy;

    if (player.y > canvas.height) {
        alert("💥 ตกเหว! เริ่มด่านนี้ใหม่นะ");
        resetPlayer();
    }

    player.grounded = false;
    let platforms = stages[currentStage];
    
    for (let i = 0; i < platforms.length; i++) {
        let block = platforms[i];

        if (player.x < block.x + block.w &&
            player.x + player.width > block.x &&
            player.y < block.y + block.h &&
            player.y + player.height > block.y) {
            
            if (block.type === 'door') {
                if (currentStage < 15) {
                    currentStage++;
                    document.getElementById("stage-num").innerText = currentStage;
                    alert(`🎉 ยินดีด้วย! ผ่านเข้าสู่ด่าน ${currentStage}`);
                    resetPlayer();
                } else {
                    // ข้อความเมื่อเคลียร์ด่าน 15 (ด่านสุดท้าย) สำเร็จตามเงื่อนไข
                    alert("🏆 ชนะแล้ว!!! คุณคือสุดยอดเกมเมอร์ผู้พิชิตด่านมหาโหดได้สำเร็จ!");
                    currentStage = 1;
                    document.getElementById("stage-num").innerText = currentStage;
                    resetPlayer();
                }
                return;
            }

            if (block.type === 'spike') {
                alert("☠️ ชนกับดัก! เริ่มใหม่");
                resetPlayer();
                return;
            }

            if (block.type === 'ground') {
                if (player.vy > 0 && player.y + player.height - player.vy <= block.y) {
                    player.y = block.y - player.height;
                    player.vy = 0;
                    player.grounded = true;
                }
            }
        }
    }

    // แอบใส่เงื่อนไขพิเศษ: ถ้าผู้เล่นหาทางผ่านด่าน 10 ไปได้จริงๆ โดยไม่ใช้สูตร (เช่น บั๊กหลุดขอบ) ให้ขึ้นข้อความชนะหรือผ่านด่านด้วย
    if (currentStage === 10 && player.x > 730 && player.y < 120) {
        alert("🏆 ชนะแล้ว! คุณผ่านด่าน 10 ที่ไม่มีทางผ่านได้! คุณมันปีศาจ!");
    }

    if (player.x < 0) player.x = 0;
    if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let platforms = stages[currentStage];
    for (let i = 0; i < platforms.length; i++) {
        let block = platforms[i];
        if (block.type === 'ground') {
            ctx.fillStyle = "#8b5a2b";
            ctx.fillRect(block.x, block.y, block.w, block.h);
        } else if (block.type === 'spike') {
            ctx.fillStyle = "#ff5555";
            ctx.fillRect(block.x, block.y, block.w, block.h);
        } else if (block.type === 'door') {
            ctx.fillStyle = "#ffd700";
            ctx.fillRect(block.x, block.y, block.w, block.h);
        }
    }

    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.width, player.height);
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
