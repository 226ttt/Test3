<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Mobile Mario Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        #ui {
            font-size: 20px;
            margin-bottom: 5px;
            font-weight: bold;
        }
        canvas {
            background: #5c94fc;
            border: 2px solid #fff;
            max-width: 95vw;
            max-height: 50vh;
            aspect-ratio: 2 / 1;
        }
        /* โซนปุ่มกดบนมือถือ */
        #dpad {
            display: flex;
            justify-content: space-between;
            width: 95vw;
            max-width: 600px;
            margin-top: 15px;
            padding: 10px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        .ctrl-btn {
            width: 65px;
            height: 65px;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid #fff;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }
        .ctrl-btn:active {
            background: rgba(255, 255, 255, 0.6);
            color: #000;
        }
        #btn-jump {
            background: rgba(255, 85, 85, 0.4);
            width: 75px;
            height: 75px;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div id="ui">STAGE: <span id="stage-num">1</span>/5</div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <!-- ปุ่มควบคุมสำหรับมือถือ -->
    <div id="dpad">
        <div class="btn-group">
            <div class="ctrl-btn" id="btn-left">◀</div>
            <div class="ctrl-btn" id="btn-right">▶</div>
        </div>
        <div class="btn-group">
            <div class="ctrl-btn" id="btn-jump">A</div>
        </div>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let currentStage = 1;
const gravity = 0.5;

const player = {
    x: 50,
    y: 300,
    width: 30,
    height: 40,
    vx: 0,
    vy: 0,
    speed: 5,
    jumpForce: 12,
    grounded: false,
    color: "#ff2222"
};

// เก็บสถานะปุ่มกด (รองรับทั้งคอมและมือถือ)
const keys = { Left: false, Right: false, Jump: false };

// โครงสร้างด่าน 1 - 5
const stages = {
    1: [
        { x: 0, y: 360, w: 800, h: 40, type: 'ground' },
        { x: 200, y: 260, w: 100, h: 30, type: 'ground' },
        { x: 400, y: 180, w: 120, h: 30, type: 'ground' },
        { x: 720, y: 280, w: 50, h: 80, type: 'door' }
    ],
    2: [
        { x: 0, y: 360, w: 300, h: 40, type: 'ground' },
        { x: 450, y: 360, w: 350, h: 40, type: 'ground' },
        { x: 250, y: 250, w: 80, h: 20, type: 'ground' },
        { x: 380, y: 200, w: 80, h: 20, type: 'ground' },
        { x: 740, y: 280, w: 50, h: 80, type: 'door' }
    ],
    3: [
        { x: 0, y: 360, w: 800, h: 40, type: 'ground' },
        { x: 250, y: 330, w: 50, h: 30, type: 'spike' },
        { x: 450, y: 330, w: 50, h: 30, type: 'spike' },
        { x: 350, y: 220, w: 100, h: 20, type: 'ground' },
        { x: 740, y: 280, w: 50, h: 80, type: 'door' }
    ],
    4: [
        { x: 0, y: 360, w: 200, h: 40, type: 'ground' },
        { x: 300, y: 300, w: 100, h: 20, type: 'ground' },
        { x: 500, y: 220, w: 100, h: 20, type: 'ground' },
        { x: 700, y: 150, w: 100, h: 250, type: 'ground' },
        { x: 740, y: 70, w: 50, h: 80, type: 'door' }
    ],
    5: [ 
        // ด่าน 5: มหาโหด (ระยะกระโดดถูกคำนวณให้กว้างเกินไปจนผ่านไม่ได้ในทางปกติ)
        { x: 0, y: 360, w: 150, h: 40, type: 'ground' },
        { x: 250, y: 360, w: 80, h: 40, type: 'ground' },
        { x: 150, y: 360, w: 100, h: 40, type: 'spike' },
        { x: 330, y: 360, w: 470, h: 40, type: 'spike' },
        // แท่นลอยที่ไกลเกินเอื้อม
        { x: 230, y: 240, w: 30, h: 10, type: 'ground' },
        { x: 420, y: 160, w: 30, h: 10, type: 'ground' },
        { x: 620, y: 120, w: 30, h: 10, type: 'ground' }, 
        { x: 740, y: 40, w: 50, h: 80, type: 'door' }
    ]
};

// --- ระบบควบคุมบนคอมพิวเตอร์ (คีย์บอร์ด) ---
window.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight" || e.key === "d") keys.Right = true;
    if (e.key === "ArrowLeft" || e.key === "a") keys.Left = true;
    if (e.key === "ArrowUp" || e.key === " " || e.key === "w") keys.Jump = true;
});
window.addEventListener("keyup", (e) => {
    if (e.key === "ArrowRight" || e.key === "d") keys.Right = false;
    if (e.key === "ArrowLeft" || e.key === "a") keys.Left = false;
    if (e.key === "ArrowUp" || e.key === " " || e.key === "w") keys.Jump = false;
});

// --- ระบบควบคุมบนมือถือ (Touch Events) ---
function setupMobileButton(id, keyName) {
    const btn = document.getElementById(id);
    btn.addEventListener("touchstart", (e) => { e.preventDefault(); keys[keyName] = true; });
    btn.addEventListener("touchend", (e) => { e.preventDefault(); keys[keyName] = false; });
}
setupMobileButton("btn-left", "Left");
setupMobileButton("btn-right", "Right");
setupMobileButton("btn-jump", "Jump");


function resetPlayer() {
    player.x = 50;
    player.y = 200;
    player.vx = 0;
    player.vy = 0;
}

function update() {
    // อัปเดตความเร็วตามปุ่มที่กด
    if (keys.Right) {
        player.vx = player.speed;
    } else if (keys.Left) {
        player.vx = -player.speed;
    } else {
        player.vx = 0;
    }

    if (keys.Jump && player.grounded) {
        player.vy = -player.jumpForce;
        player.grounded = false;
    }

    player.vy += gravity;
    player.x += player.vx;
    player.y += player.vy;

    // ตกเหว
    if (player.y > canvas.height) {
        alert("💥 ตกเหว! เริ่มด่านนี้ใหม่นะ");
        resetPlayer();
    }

    player.grounded = false;
    let platforms = stages[currentStage];
    
    for (let i = 0; i < platforms.length; i++) {
        let block = platforms[i];

        if (player.x < block.x + block.w &&
            player.x + player.width > block.x &&
            player.y < block.y + block.h &&
            player.y + player.height > block.y) {
            
            if (block.type === 'door') {
                if (currentStage < 5) {
                    currentStage++;
                    document.getElementById("stage-num").innerText = currentStage;
                    alert(`🎉 เยินดีด้วย! ผ่านเข้าสู่ด่าน ${currentStage}`);
                    resetPlayer();
                } else {
                    alert("🏆 บ้าน่า!! คุณผ่านด่าน 5 ได้ยังไงกัน!?");
                    currentStage = 1;
                    document.getElementById("stage-num").innerText = currentStage;
                    resetPlayer();
                }
                return;
            }

            if (block.type === 'spike') {
                alert("☠️ ชนกับดัก! เริ่มใหม่");
                resetPlayer();
                return;
            }

            if (block.type === 'ground') {
                if (player.vy > 0 && player.y + player.height - player.vy <= block.y) {
                    player.y = block.y - player.height;
                    player.vy = 0;
                    player.grounded = true;
                }
            }
        }
    }

    if (player.x < 0) player.x = 0;
    if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let platforms = stages[currentStage];
    for (let i = 0; i < platforms.length; i++) {
        let block = platforms[i];
        if (block.type === 'ground') {
            ctx.fillStyle = "#8b5a2b";
            ctx.fillRect(block.x, block.y, block.w, block.h);
        } else if (block.type === 'spike') {
            ctx.fillStyle = "#ff5555";
            ctx.fillRect(block.x, block.y, block.w, block.h);
        } else if (block.type === 'door') {
            ctx.fillStyle = "#ffd700";
            ctx.fillRect(block.x, block.y, block.w, block.h);
        }
    }

    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.width, player.height);
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
